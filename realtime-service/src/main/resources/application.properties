spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ===============================================================
# REALTIME CONFIGURATION
# ===============================================================
# Presence backend: memory or redis
presence.store=${PRESENCE_STORE:memory}
# Allowed CORS origins for websocket endpoint
app.allowed-origins=${ALLOWED_ORIGINS:*}
# STOMP broker relay for horizontal scaling (requires RabbitMQ STOMP plugin)
broker.relay.enabled=${BROKER_RELAY_ENABLED:false}
broker.relay.host=${BROKER_RELAY_HOST:localhost}
broker.relay.port=${BROKER_RELAY_PORT:61613}
broker.relay.login=${BROKER_RELAY_LOGIN:guest}
broker.relay.passcode=${BROKER_RELAY_PASSCODE:guest}
broker.relay.virtual-host=${BROKER_RELAY_VIRTUAL_HOST:/}

# ===============================================================
# OBSERVABILITY
# ===============================================================
app.version=${APP_VERSION:1.0.0}
logging.level.chatapp.realtimeservice=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.web=${LOG_LEVEL_SPRING:DEBUG}
logging.level.org.springframework.messaging=${LOG_LEVEL_SPRING:DEBUG}
