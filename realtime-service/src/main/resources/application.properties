spring.application.name=realtime-service

# JWT secret - must be configured via environment variable or profile-specific config
jwt.secret=${JWT_SECRET:}

# Redis configuration - use environment variables in production
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Presence backend storage - can be: memory (development) or redis (production)
presence.store=${PRESENCE_STORE:memory}

# Application configuration
app.version=1.0.0
# Internal API key for inter-service communication - configure via environment variable
app.internal-api-key=${INTERNAL_API_KEY:}

# CORS - configure allowed origins for WebSocket connections
app.allowed-origins=${ALLOWED_ORIGINS:*}

# Logging
logging.level.chatapp.realtimeservice=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=${LOG_LEVEL_SPRING:WARN}

