# ===============================================================
# CORE APPLICATION
# ===============================================================
spring.application.name=realtime-service

# ===============================================================
# SECURITY
# ===============================================================
# Must match JWT signing secret from API Gateway/Auth service
jwt.secret=${JWT_SECRET:dev-local-jwt-secret-change-me}
# Internal key used for trusted service-to-service endpoints
app.internal-api-key=${INTERNAL_API_KEY:dev-internal-key-change-me}

# ===============================================================
# INFRASTRUCTURE
# ===============================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ===============================================================
# REALTIME CONFIGURATION
# ===============================================================
# Presence backend: memory or redis
presence.store=${PRESENCE_STORE:memory}
# Allowed CORS origins for websocket endpoint
app.allowed-origins=${ALLOWED_ORIGINS:*}

# ===============================================================
# OBSERVABILITY
# ===============================================================
app.version=${APP_VERSION:1.0.0}
logging.level.chatapp.realtimeservice=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=${LOG_LEVEL_SPRING:WARN}
