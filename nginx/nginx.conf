events {
  worker_connections 1024;
}

http {
  server_tokens off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  log_format upstreamlog '$remote_addr "$request" '
                         'status=$status upstream=$upstream_addr '
                         'upstream_status=$upstream_status request_time=$request_time '
                         'upstream_response_time=$upstream_response_time';

  access_log /var/log/nginx/access.log upstreamlog;

  proxy_connect_timeout 5s;
  proxy_send_timeout 30s;
  proxy_read_timeout 30s;
  proxy_next_upstream error timeout http_502 http_503 http_504;
  proxy_next_upstream_tries 2;

  resolver 127.0.0.11 ipv6=off valid=10s;

  upstream api_gateway {
    zone api_gateway 64k;
    least_conn;
    server api-gateway:3000 resolve;
  }

  upstream realtime_service {
    zone realtime_service 64k;
    server realtime-service:8080 resolve;
  }

  upstream sfu_service {
    zone sfu_service 64k;
    server sfu-service:4000 resolve;
  }

  server {
    listen 80;

    client_max_body_size 10m;

    location /health {
      proxy_pass http://api_gateway;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-User-Id, Idempotency-Key, X-Idempotency-Key" always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Max-Age 86400 always;
        return 204;
      }
      proxy_pass http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_hide_header Access-Control-Allow-Origin;
      add_header Access-Control-Allow-Origin $http_origin always;
      add_header Access-Control-Allow-Credentials true always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-User-Id, Idempotency-Key, X-Idempotency-Key" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
      if ($request_method = OPTIONS) {
        return 204;
      }
    }

    location /graphql {
      proxy_pass http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
      proxy_pass http://realtime_service;
      proxy_http_version 1.1;
      proxy_connect_timeout 5s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location /sfu/api/ {
      rewrite ^/sfu(/.*)$ $1 break;
      proxy_pass http://sfu_service;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /sfu/ws {
      rewrite ^/sfu(/.*)$ $1 break;
      proxy_pass http://sfu_service;
      proxy_http_version 1.1;
      proxy_connect_timeout 5s;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }
  }
}
