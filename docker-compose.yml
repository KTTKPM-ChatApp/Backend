services:
  mariadb:
    image: mariadb:11
    container_name: ktpm-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: sapassword
      MYSQL_DATABASE: auth_service
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ktpm-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ktpm-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: ktpm-auth-service
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      PORT: 3001
      NODE_ENV: development
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: sapassword
      DB_NAME: auth_service
      JWT_SECRET: daihockythuatphanmem18ctt
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: daihockythuatphanmem
      JWT_REFRESH_EXPIRES_IN: 30d
    ports:
      - "3001:3001"

  chat-service:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    container_name: ktpm-chat-service
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      PORT: 3003
      NODE_ENV: development
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: sapassword
      DB_NAME: chat_service
      DB_CONNECT_RETRY_ATTEMPTS: 25
      DB_CONNECT_RETRY_DELAY_MS: 3000
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_EXCHANGE: chat.events
      RABBITMQ_ROUTING_KEY_NEW_MESSAGE: chat.new_message
      # Kết nối tới realtime-service để push notification
      REALTIME_SERVICE_URL: http://realtime-service:8080
      INTERNAL_API_KEY: ktpm-internal-secret-key-2024
    ports:
      - "3003:3003"

  realtime-service:
    build:
      context: ./realtime-service
      dockerfile: Dockerfile
    container_name: ktpm-realtime-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Phải khớp với JWT_SECRET trong auth-service và api-gateway
      JWT_SECRET: daihockythuatphanmem18ctt
      # Shared secret cho inter-service communication (chat → realtime)
      INTERNAL_API_KEY: ktpm-internal-secret-key-2024
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      # WebSocket CORS — cho phép tất cả trong môi trường dev/docker
      ALLOWED_ORIGINS: "*"
      APP_VERSION: 1.0.0
    ports:
      - "8080:8080"

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: ktpm-api-gateway
    restart: unless-stopped
    depends_on:
      - auth-service
      - chat-service
    environment:
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: daihockythuatphanmem18ctt
      AUTH_SERVICE_URL: http://auth-service:3001
      CHAT_SERVICE_URL: http://chat-service:3003
    ports:
      - "4321:3000"

volumes:
  mariadb_data:
  rabbitmq_data:
  redis_data:
