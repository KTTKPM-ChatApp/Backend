version: '3.8'

services:
  mariadb:
    image: mariadb:11
    container_name: ktpm-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: sapassword
      MYSQL_DATABASE: auth_service
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ktpm-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: ktpm-auth-service
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: sapassword
      DB_NAME: auth_service
      JWT_SECRET: daihockythuatphanmem18ctt
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: daihockythuatphanmem
      JWT_REFRESH_EXPIRES_IN: 30d
    ports:
      - "3001:3001"

  chat-service:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    container_name: ktpm-chat-service
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      PORT: 3003
      NODE_ENV: production
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: sapassword
      DB_NAME: chat_service
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_EXCHANGE: chat.events
      RABBITMQ_ROUTING_KEY_NEW_MESSAGE: chat.new_message
    ports:
      - "3003:3003"

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: ktpm-api-gateway
    restart: unless-stopped
    depends_on:
      - auth-service
      - chat-service
    environment:
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: daihockythuatphanmem18ctt
      AUTH_SERVICE_URL: http://auth-service:3001
      CHAT_SERVICE_URL: http://chat-service:3003
    ports:
      - "3000:3000"

volumes:
  mariadb_data:
  rabbitmq_data:
