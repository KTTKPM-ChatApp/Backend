services:
  mariadb:
    image: mariadb:11
    container_name: ktpm-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: auth_service
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  mariadb-chat:
    image: mariadb:11
    container_name: ktpm-mariadb-chat
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: chat_service
    ports:
      - "3307:3306"
    volumes:
      - mariadb_chat_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ktpm-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ktpm-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: ktpm-auth-service
    restart: unless-stopped
    depends_on:
      auth-service-db-init:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      PORT: 3001
      NODE_ENV: development
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS}
      DB_NAME: auth_service
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: 30d
    ports:
      - "3001:3001"

  auth-service-db-init:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: ktpm-auth-service-db-init
    restart: "no"
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      PORT: 3001
      NODE_ENV: development
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS}
      DB_NAME: auth_service
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: 30d
    command: ["node", "dist/seed.js"]

  chat-service-db-init:
    build:
      context: .
      dockerfile: ./chat-service/Dockerfile
    container_name: ktpm-chat-service-db-init
    restart: "no"
    depends_on:
      mariadb-chat:
        condition: service_healthy
    environment:
      PORT: 3003
      NODE_ENV: development
      DB_HOST: mariadb-chat
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS}
      DB_NAME: chat_service
      AUTH_SERVICE_URL: http://auth-service:3001
    command: ["node", "dist/chat-service/src/seed.js"]

  chat-service:
    build:
      context: .
      dockerfile: ./chat-service/Dockerfile
    container_name: ktpm-chat-service
    restart: unless-stopped
    depends_on:
      chat-service-db-init:
        condition: service_completed_successfully
      mariadb-chat:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      PORT: 3003
      NODE_ENV: development
      DB_HOST: mariadb-chat
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS}
      DB_NAME: chat_service
      DB_CONNECT_RETRY_ATTEMPTS: 25
      DB_CONNECT_RETRY_DELAY_MS: 3000
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672
      RABBITMQ_EXCHANGE: chat.events
      RABBITMQ_ROUTING_KEY_NEW_MESSAGE: chat.new_message
      AUTH_SERVICE_URL: http://auth-service:3001
      # Kết nối tới realtime-service để push notification
      REALTIME_SERVICE_URL: http://realtime-service:8080
      INTERNAL_API_KEY: ktpm-internal-secret-key-2024
      GATEWAY_SERVICE_URL: http://api-gateway:3000
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
    ports:
      - "3003:3003"

  realtime-service:
    build:
      context: ./realtime-service
      dockerfile: Dockerfile
    container_name: ktpm-realtime-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Phải khớp với JWT_SECRET trong auth-service và api-gateway
      JWT_SECRET: ${JWT_SECRET}
      # Shared secret cho inter-service communication (chat → realtime)
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      # WebSocket CORS — cho phép tất cả trong môi trường dev/docker
      ALLOWED_ORIGINS: "*"
      APP_VERSION: 1.0.0
    ports:
      - "8080:8080"

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: ktpm-api-gateway
    restart: unless-stopped
    depends_on:
      - auth-service
      - chat-service
    environment:
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:3001
      CHAT_SERVICE_URL: http://chat-service:3003
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      CLOUDINARY_UPLOAD_FOLDER: ${CLOUDINARY_UPLOAD_FOLDER:-zalo-chat}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
    ports:
      - "4321:3000"

volumes:
  mariadb_data:
  mariadb_chat_data:
  rabbitmq_data:
  redis_data:
