services:
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: auth_service
    expose:
      - "3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  mariadb-chat:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: chat_service
    expose:
      - "3306"
    volumes:
      - mariadb_chat_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  mariadb-chatbot:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ai_chatbot_service
    expose:
      - "3306"
    volumes:
      - mariadb_chatbot_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    expose:
      - "5672"
      - "15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      auth-service-db-init:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      PORT: 3001
      NODE_ENV: development
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS}
      DB_NAME: auth_service
      DB_CONNECT_RETRY_ATTEMPTS: ${DB_CONNECT_RETRY_ATTEMPTS:-25}
      DB_CONNECT_RETRY_DELAY_MS: ${DB_CONNECT_RETRY_DELAY_MS:-3000}
      DB_CONNECT_RETRY_MAX_DELAY_MS: ${DB_CONNECT_RETRY_MAX_DELAY_MS:-30000}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672
      RABBITMQ_RECONNECT_INITIAL_DELAY_MS: ${RABBITMQ_RECONNECT_INITIAL_DELAY_MS:-1000}
      RABBITMQ_RECONNECT_MAX_DELAY_MS: ${RABBITMQ_RECONNECT_MAX_DELAY_MS:-30000}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: 30d
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_RECONNECT_MAX_DELAY_MS: ${REDIS_RECONNECT_MAX_DELAY_MS:-30000}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-100}
      RATE_LIMIT_AUTH_PUBLIC_MAX: ${RATE_LIMIT_AUTH_PUBLIC_MAX:-20}
      # Internal API Key (for presence calls from Gateway)
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service-db-init:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    restart: "no"
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      PORT: 3001
      NODE_ENV: development
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS}
      DB_NAME: auth_service
      DB_CONNECT_RETRY_ATTEMPTS: ${DB_CONNECT_RETRY_ATTEMPTS:-25}
      DB_CONNECT_RETRY_DELAY_MS: ${DB_CONNECT_RETRY_DELAY_MS:-3000}
      DB_CONNECT_RETRY_MAX_DELAY_MS: ${DB_CONNECT_RETRY_MAX_DELAY_MS:-30000}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: 30d
    command: ["node", "dist/seed.js"]

  chat-service-db-init:
    build:
      context: .
      dockerfile: ./chat-service/Dockerfile
    restart: "no"
    depends_on:
      mariadb-chat:
        condition: service_healthy
    environment:
      PORT: 3003
      NODE_ENV: development
      DB_HOST: mariadb-chat
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS}
      DB_NAME: chat_service
      DB_CONNECT_RETRY_ATTEMPTS: ${DB_CONNECT_RETRY_ATTEMPTS:-25}
      DB_CONNECT_RETRY_DELAY_MS: ${DB_CONNECT_RETRY_DELAY_MS:-3000}
      DB_CONNECT_RETRY_MAX_DELAY_MS: ${DB_CONNECT_RETRY_MAX_DELAY_MS:-30000}
      AUTH_SERVICE_URL: http://auth-service:3001
    command: ["node", "dist/chat-service/src/seed.js"]

  chat-service:
    build:
      context: .
      dockerfile: ./chat-service/Dockerfile
    restart: unless-stopped
    depends_on:
      chat-service-db-init:
        condition: service_completed_successfully
      mariadb-chat:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      PORT: 3003
      NODE_ENV: development
      DB_HOST: mariadb-chat
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS}
      DB_NAME: chat_service
      DB_CONNECT_RETRY_ATTEMPTS: ${DB_CONNECT_RETRY_ATTEMPTS:-25}
      DB_CONNECT_RETRY_DELAY_MS: ${DB_CONNECT_RETRY_DELAY_MS:-3000}
      DB_CONNECT_RETRY_MAX_DELAY_MS: ${DB_CONNECT_RETRY_MAX_DELAY_MS:-30000}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672
      RABBITMQ_EXCHANGE: chat.events
      RABBITMQ_ROUTING_KEY_NEW_MESSAGE: chat.new_message
      RABBITMQ_RECONNECT_INITIAL_DELAY_MS: ${RABBITMQ_RECONNECT_INITIAL_DELAY_MS:-1000}
      RABBITMQ_RECONNECT_MAX_DELAY_MS: ${RABBITMQ_RECONNECT_MAX_DELAY_MS:-30000}
      AUTH_SERVICE_URL: http://auth-service:3001
      # Kết nối tới realtime-service để push notification
      REALTIME_SERVICE_URL: http://realtime-service:8080
      INTERNAL_API_KEY: ktpm-internal-secret-key-2024
      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      CLOUDINARY_UPLOAD_FOLDER: ${CLOUDINARY_UPLOAD_FOLDER:-zalo-chat}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_RECONNECT_MAX_DELAY_MS: ${REDIS_RECONNECT_MAX_DELAY_MS:-30000}
    expose:
      - "3003"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3003/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-chatbot-service:
    build:
      context: .
      dockerfile: ./ai-chatbot-service/Dockerfile
    restart: unless-stopped
    depends_on:
      mariadb-chatbot:
        condition: service_healthy
    environment:
      PORT: 3005
      NODE_ENV: development
      DB_HOST: mariadb-chatbot
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: ${DB_PASS}
      DB_NAME: ai_chatbot_service
      DB_CONNECT_RETRY_ATTEMPTS: ${DB_CONNECT_RETRY_ATTEMPTS:-25}
      DB_CONNECT_RETRY_DELAY_MS: ${DB_CONNECT_RETRY_DELAY_MS:-3000}
      DB_CONNECT_RETRY_MAX_DELAY_MS: ${DB_CONNECT_RETRY_MAX_DELAY_MS:-30000}
      AI_PROVIDER: ${AI_PROVIDER:-openrouter}
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL:-openrouter/free}
      AI_BASE_URL: ${AI_BASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "3005"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3005/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  realtime-service:
    build:
      context: ./realtime-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Phải khớp với JWT_SECRET trong auth-service và api-gateway
      JWT_SECRET: ${JWT_SECRET}
      # Shared secret cho inter-service communication (chat → realtime)
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      # WebSocket CORS — cho phép tất cả trong môi trường dev/docker
      ALLOWED_ORIGINS: "*"
      APP_VERSION: 1.0.0
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      ai-chatbot-service:
        condition: service_healthy
      realtime-service:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:3001
      CHAT_SERVICE_URL: http://chat-service:3003
      CHATBOT_SERVICE_URL: http://ai-chatbot-service:3005
      REALTIME_SERVICE_URL: http://realtime-service:8080
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_RECONNECT_MAX_DELAY_MS: ${REDIS_RECONNECT_MAX_DELAY_MS:-30000}
      GATEWAY_PROXY_TIMEOUT_MS: ${GATEWAY_PROXY_TIMEOUT_MS:-10000}
      RATE_LIMIT_API_MAX: ${RATE_LIMIT_API_MAX:-300}
      RATE_LIMIT_AUTH_PUBLIC_MAX: ${RATE_LIMIT_AUTH_PUBLIC_MAX:-20}
      RATE_LIMIT_MESSAGE_WRITE_WINDOW_MS: ${RATE_LIMIT_MESSAGE_WRITE_WINDOW_MS:-5000}
      RATE_LIMIT_MESSAGE_WRITE_MAX: ${RATE_LIMIT_MESSAGE_WRITE_MAX:-3}
      RATE_LIMIT_UPLOAD_MAX: ${RATE_LIMIT_UPLOAD_MAX:-30}
      RATE_LIMIT_CHATBOT_MAX: ${RATE_LIMIT_CHATBOT_MAX:-60}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_healthy
      realtime-service:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-4321}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: http nginx:80 --domain=${NGROK_DOMAIN}
    depends_on:
      - nginx

volumes:
  mariadb_data:
  mariadb_chat_data:
  mariadb_chatbot_data:
  rabbitmq_data:
  redis_data:
